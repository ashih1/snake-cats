<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>貪吃貓 🐾</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e9e4fb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="貪吃貓">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; overflow:hidden; font-family:"Press Start 2P", ui-monospace, monospace; }
  body { background:linear-gradient(160deg,#fdeef5 0%,#e8e3fb 40%,#dcf2f7 75%,#fdf3e0 100%); }
  canvas { display:block; width:100vw; height:100vh; image-rendering:pixelated; }
  #overlay {
    position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:rgba(253,240,248,.82); backdrop-filter:blur(8px); z-index:10; gap:22px; text-align:center;
  }
  h1 { font-size:clamp(26px,5vw,52px); color:#9b7fc7; text-shadow:3px 3px 0 #f3d1e3; letter-spacing:4px; }
  .sub { color:#b89cc8; font-size:clamp(11px,1.5vw,14px); }
  #avatars { display:flex; gap:14px; flex-wrap:wrap; justify-content:center; }
  .av { width:84px; height:84px; border-radius:18px; border:4px solid transparent; cursor:pointer;
        background:#fff8fc; padding:6px; transition:transform .15s; }
  .av img { width:100%; height:100%; image-rendering:pixelated; border-radius:10px; }
  .av:hover { transform:translateY(-4px) scale(1.06); }
  .av.sel { border-color:#b5a1e8; box-shadow:0 0 18px #cdbcf2; }
  input#name {
    font-family:inherit; font-size:15px; padding:12px 18px; border-radius:14px; border:3px solid #e3cdf0;
    background:#fffafc; color:#8a6fb0; outline:none; text-align:center; width:min(280px,80vw);
  }
  .modeBtn {
    font-family:inherit; font-size:16px; padding:14px 38px; border-radius:16px; border:none; cursor:pointer;
    background:linear-gradient(135deg,#f6c6d9,#c9b6f0); color:#fff; text-shadow:1px 1px 0 #b495cf;
    box-shadow:0 6px 0 #d8b9d9; transition:transform .1s;
  }
  .modeBtn:active { transform:translateY(4px); box-shadow:0 2px 0 #d8b9d9; }
  #hud { position:fixed; top:10px; left:12px; z-index:5; color:#9b7fc7; font-size:11px;
         background:rgba(255,250,253,.7); padding:10px 14px; border-radius:12px; line-height:1.9; display:none; }
  #deadmsg { position:fixed; inset:0; display:none; align-items:center; justify-content:center; z-index:8;
             color:#c98bb1; font-size:clamp(16px,3vw,28px); text-shadow:2px 2px 0 #fff; flex-direction:column; gap:12px;}
  .hidden { display:none !important; }
  #btnRow { display:flex; gap:14px; flex-wrap:wrap; justify-content:center; }
  #ctrlBar { position:fixed; left:0; right:0; bottom:0; height:130px; z-index:7; display:none;
             justify-content:space-between; align-items:center; padding:0 18px env(safe-area-inset-bottom);
             background:rgba(255,250,253,.55); backdrop-filter:blur(6px); border-top:2px solid rgba(200,175,225,.35); }
  .cgroup { display:flex; gap:14px; }
  .cbtn { width:96px; height:96px; border-radius:24px; display:flex; align-items:center; justify-content:center;
          font-size:38px; color:#fff; user-select:none; -webkit-user-select:none; touch-action:manipulation;
          background:linear-gradient(135deg,#f6c6d9, #c9b6f0); box-shadow:0 4px 8px rgba(160,130,190,.35);
          border:3px solid rgba(255,255,255,.65); }
  .cbtn:active { transform:scale(.9); }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="hud"></div>
<div id="ctrlBar">
  <div class="cgroup"><div class="cbtn" data-dir="up">▲</div><div class="cbtn" data-dir="down">▼</div></div>
  <div class="cgroup"><div class="cbtn" data-dir="left">◀</div><div class="cbtn" data-dir="right">▶</div></div>
</div>
<div id="deadmsg"><div>💫 你死掉了…</div><div style="font-size:12px;color:#b89cc8">3 秒後重生</div></div>

<div id="overlay">
  <h1>貪吃貓</h1>
  <div class="sub">✦ 選一隻寶貝，去吃大便吧 ✦</div>
  <div id="avatars"></div>
  <input id="name" maxlength="12" placeholder="你的名字">
  <div id="btnRow">
    <button id="play" class="modeBtn">連線一起玩 ♡</button>
    <button id="playSolo" class="modeBtn" style="background:linear-gradient(135deg,#aee3f0,#c9b6f0)">自己玩 ☆</button>
  </div>
  <div class="sub">電腦：方向鍵 / WASD · 手機：點左半邊往左轉、右半邊往右轉</div>
</div>

<script>
const AVATARS = [
  { key:'maru',    label:'maru', color:'#e8cfa8' },
  { key:'xiaoyu1', label:'小雨1', color:'#f9e3a8' },
  { key:'xiaoyu2', label:'小雨2', color:'#c5cbe0' },
  { key:'abai',    label:'阿拜', color:'#aecbf0' },
  { key:'dian',    label:'點', color:'#f6c6d9' },
];
const imgs = {}, sheets = {};
for (const a of AVATARS) {
  const im = new Image(); im.src = 'avatars/' + a.key + '.png'; imgs[a.key] = im;
  const sh = new Image(); sh.src = 'avatars/' + a.key + '_sheet.png'; sheets[a.key] = sh;
}
const FR = 42; // sprite frame size in source pixels

// ---- join UI ----
let selected = AVATARS[0];
const avDiv = document.getElementById('avatars');
AVATARS.forEach((a, i) => {
  const d = document.createElement('div');
  d.className = 'av' + (i === 0 ? ' sel' : '');
  d.innerHTML = `<img src="avatars/${a.key}.png" title="${a.label}">`;
  d.onclick = () => { document.querySelectorAll('.av').forEach(e => e.classList.remove('sel')); d.classList.add('sel'); selected = a; };
  avDiv.appendChild(d);
});

// ---- canvas ----
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
function resize() {
  // size canvas to the real visible viewport (fixes mobile URL-bar cropping)
  canvas.style.width = innerWidth + 'px';
  canvas.style.height = innerHeight + 'px';
  canvas.width = innerWidth * devicePixelRatio;
  canvas.height = innerHeight * devicePixelRatio;
}
addEventListener('resize', resize);
if (window.visualViewport) visualViewport.addEventListener('resize', resize);
resize();

// pixel poop sprite
const poopCanvas = document.createElement('canvas');
poopCanvas.width = poopCanvas.height = 8;
(() => {
  const c = poopCanvas.getContext('2d');
  const P = [
    '........',
    '...55...',
    '...55...',
    '..5665..',
    '.566665.',
    '.577775.',
    '56777765',
    '.555555.',
  ];
  const cols = { '5':'#c79a6b', '6':'#b07f50', '7':'#9a6b3f' };
  P.forEach((row, y) => [...row].forEach((ch, x) => { if (cols[ch]) { c.fillStyle = cols[ch]; c.fillRect(x, y, 1, 1); } }));
})();
// diarrhea splat sprite (runny poop puddle)
const splatCanvas = document.createElement('canvas');
splatCanvas.width = splatCanvas.height = 8;
(() => {
  const c = splatCanvas.getContext('2d');
  const P = [
    '........',
    '....5...',
    '...55...',
    '..5665.5',
    '5.66765.',
    '.6677665',
    '56777765',
    '.5656565',
  ];
  const cols = { '5':'#d3a875', '6':'#bb8a55', '7':'#a07344' };
  P.forEach((row, y) => [...row].forEach((ch, x) => { if (cols[ch]) { c.fillStyle = cols[ch]; c.fillRect(x, y, 1, 1); } }));
})();
// bomb sprite
const bombCanvas = document.createElement('canvas');
bombCanvas.width = bombCanvas.height = 8;
(() => {
  const c = bombCanvas.getContext('2d');
  const P = [
    '.....f..',
    '....f...',
    '...44...',
    '..3333..',
    '.333933.',
    '.339933.',
    '.333333.',
    '..3333..',
  ];
  const cols = { '3':'#4a4458', '9':'#6e6584', '4':'#8d8499', 'f':'#f2a65a' };
  P.forEach((row, y) => [...row].forEach((ch, x) => { if (cols[ch]) { c.fillStyle = cols[ch]; c.fillRect(x, y, 1, 1); } }));
})();

// ---- state ----
let ws, myId = null, GRID_W = 44, GRID_H = 26;
let mode = null; // 'online' | 'solo'
const isMobile = (('ontouchstart' in window) && Math.min(screen.width, screen.height) < 820) || location.search.includes('mobile=1');
let camX = 22, camY = 13, camInit = false;
let state = { players: [], poops: [] };
const eatUntil = {}, lastFace = {}, lastLen = {};
let effects = [], shakeUntil = 0, myHeadPx = null;
let sparkles = [];
for (let i = 0; i < 40; i++) sparkles.push({ x: Math.random(), y: Math.random(), s: Math.random()*2+1, ph: Math.random()*6.28 });

function connect() {
  const proto = location.protocol === 'https:' ? 'wss://' : 'ws://';
  ws = new WebSocket(proto + location.host);
  ws.onmessage = e => {
    const m = JSON.parse(e.data);
    if (m.type === 'welcome') { if (mode !== 'solo') { myId = m.id; GRID_W = m.gridW; GRID_H = m.gridH; } }
    else if (m.type === 'state') {
      if (mode === 'solo') return;
      state = m;
      const now = performance.now();
      if (m.booms) for (const [bx, by] of m.booms) {
        effects.push({ x: bx, y: by, start: now });
        sfx.boom();
        shakeUntil = now + 400;
      }
      for (const p of m.players) {
        if (p.alive && lastLen[p.id] && p.body.length > lastLen[p.id]) eatUntil[p.id] = now + 450;
        lastLen[p.id] = p.alive ? p.body.length : 0;
      }
    }
    else if (m.type === 'dead') {
      if (mode === 'solo') return;
      sfx.die();
      const dm = document.getElementById('deadmsg');
      dm.style.display = 'flex';
      setTimeout(() => dm.style.display = 'none', 3000);
    }
  };
  ws.onclose = () => setTimeout(connect, 1500);
}
connect();

function startGame(m) {
  initAudio();
  sfx.spawn();
  mode = m;
  const name = document.getElementById('name').value.trim() || selected.label;
  if (m === 'online') {
    ws.send(JSON.stringify({ type: 'join', name, avatar: selected.key, color: selected.color }));
  } else {
    solo.start(name, selected.key, selected.color);
  }
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('hud').style.display = 'block';
  if (isMobile) document.getElementById('ctrlBar').style.display = 'flex';
  if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(()=>{});
}
document.getElementById('play').onclick = () => startGame('online');
document.getElementById('playSolo').onclick = () => startGame('solo');

// ---- solo (offline) engine: same rules, one player ----
const solo = {
  W: 30, H: 30, me: null, poops: [], bombs: [], timer: null,
  start(name, avatar, color) {
    // one fixed screen: grid fits the device aspect, ~13 cells on the short side
    const availH = isMobile ? innerHeight - 132 : innerHeight;  // exclude button bar
    const aspect = innerWidth / availH;
    const S = isMobile ? 18 : 13;
    if (aspect < 1) { this.W = S; this.H = Math.min(32, Math.round(S / aspect)); }
    else { this.H = S; this.W = Math.min(32, Math.round(S * aspect)); }
    GRID_W = this.W; GRID_H = this.H; myId = 1;
    const sy = Math.floor(this.H / 2);
    this.me = { id:1, name, avatar, color, alive:true, score:0, dir:'right', pending:'right',
                body:[[5,sy],[4,sy],[3,sy],[2,sy]] };
    this.poops = []; this.bombs = [];
    clearTimeout(this.timer);
    const loop = () => {
      this.tick();
      const delay = Math.max(85, 160 - this.me.score * 4);  // faster as you score
      this.timer = setTimeout(loop, delay);
    };
    loop();
  },
  free(x,y){ return !this.me.body.some(c=>c[0]===x&&c[1]===y) && !this.poops.some(p=>p[0]===x&&p[1]===y) && !this.bombs.some(b=>b[0]===x&&b[1]===y); },
  rand(){ return [Math.floor(Math.random()*this.W), Math.floor(Math.random()*this.H)]; },
  tick() {
    const DIRS={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]};
    const maxBombs = Math.min(6, 1 + Math.floor(this.me.score / 4)); // more bombs as you score
    while (this.poops.length < 8) { const [x,y]=this.rand(); if(this.free(x,y)) this.poops.push([x,y,0]); }
    while (this.bombs.length < maxBombs) { const [x,y]=this.rand(); if(this.free(x,y)) this.bombs.push([x,y]); }
    const booms = [];
    const m = this.me;
    if (m.alive) {
      m.dir = m.pending;
      const [dx,dy]=DIRS[m.dir];
      const nx=(m.body[0][0]+dx+this.W)%this.W, ny=(m.body[0][1]+dy+this.H)%this.H;
      let grew=false, died=false;
      const pi=this.poops.findIndex(p=>p[0]===nx&&p[1]===ny);
      if(pi>=0){ this.poops.splice(pi,1); grew=true; m.score++; }
      const bi=this.bombs.findIndex(b=>b[0]===nx&&b[1]===ny);
      if(bi>=0){ const [bx,by]=this.bombs.splice(bi,1)[0]; booms.push([bx,by]);
        let added=0,tr=0;
        while(added<10&&tr<200){ tr++;
          const x=(bx+Math.floor(Math.random()*9)-4+this.W)%this.W, y=(by+Math.floor(Math.random()*9)-4+this.H)%this.H;
          if(this.free(x,y)){ this.poops.push([x,y,1]); added++; } }
        died=true;  // 💥 bomb = game over
      }
      m.body.unshift([nx,ny]);
      if(!grew) m.body.pop();
      // self collision
      if(!died) for(let i=1;i<m.body.length;i++) if(m.body[i][0]===nx&&m.body[i][1]===ny){ died=true; break; }
      if(died){
        m.alive=false;
        sfx.die();
        const dm=document.getElementById('deadmsg');
        dm.style.display='flex';
        const sy=Math.floor(this.H/2);
        setTimeout(()=>{ dm.style.display='none';
          m.score=0; m.alive=true; m.dir=m.pending='right'; m.body=[[5,sy],[4,sy],[3,sy],[2,sy]];
          this.bombs=[]; }, 3000);
      }
    }
    state = { players:[{...m, body:m.body}], poops:this.poops, bombs:this.bombs, booms };
    const now = performance.now();
    for (const [bx,by] of booms){ effects.push({x:bx,y:by,start:now}); sfx.boom(); shakeUntil=now+400; }
    if (lastLen[1] && m.alive && m.body.length > lastLen[1]) eatUntil[1]=now+450;
    lastLen[1] = m.alive ? m.body.length : 0;
  }
};

// ---- input ----
function sendDirCmd(d) {
  if (!d) return;
  if (mode === 'solo') {
    const OPP = { up:'down', down:'up', left:'right', right:'left' };
    if (solo.me && solo.me.alive && d !== OPP[solo.me.dir]) { solo.me.pending = d; sfx.turn(); }
  } else if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type:'dir', dir:d })); sfx.turn();
  }
}
function myDir() {
  if (mode === 'solo') return solo.me ? solo.me.dir : 'right';
  const me = state.players.find(p => p.id === myId);
  return me ? me.dir : 'right';
}
const keyMap = { ArrowUp:'up', ArrowDown:'down', ArrowLeft:'left', ArrowRight:'right', w:'up', s:'down', a:'left', d:'right' };
addEventListener('keydown', e => {
  if (keyMap[e.key]) { sendDirCmd(keyMap[e.key]); e.preventDefault(); }
});
// ---- mobile controls: button bar (▲▼ left side, ◀▶ right side) + swipe on the field ----
for (const b of document.querySelectorAll('.cbtn')) {
  b.addEventListener('touchstart', e => {
    sendDirCmd(b.dataset.dir); e.preventDefault(); e.stopPropagation();
  }, { passive:false });
}
let touchStart = null, swiped = false;
addEventListener('touchstart', e => {
  if (!document.getElementById('overlay').classList.contains('hidden')) return;
  if (e.target.classList && e.target.classList.contains('cbtn')) return;
  touchStart = [e.changedTouches[0].clientX, e.changedTouches[0].clientY];
  swiped = false;
}, { passive:true });
addEventListener('touchmove', e => {
  if (!touchStart || swiped) return;
  const dx = e.changedTouches[0].clientX - touchStart[0], dy = e.changedTouches[0].clientY - touchStart[1];
  if (Math.abs(dx) + Math.abs(dy) < 24) return;
  sendDirCmd(Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? 'right' : 'left') : (dy > 0 ? 'down' : 'up'));
  swiped = true;  // one turn per swipe
}, { passive:true });
addEventListener('touchend', () => { touchStart = null; });

// ---- sound effects (Web Audio, synthesized cute bleeps) ----
let actx = null;
function initAudio() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  if (actx.state === 'suspended') actx.resume();
}
function tone(freq, dur, type = 'sine', vol = 0.18, when = 0, slideTo = null) {
  if (!actx) return;
  const t0 = actx.currentTime + when;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, t0);
  if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t0 + dur);
  g.gain.setValueAtTime(vol, t0);
  g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  o.connect(g); g.connect(actx.destination);
  o.start(t0); o.stop(t0 + dur + 0.05);
}
const sfx = {
  eat()   { tone(520, 0.09, 'square', 0.12); tone(780, 0.12, 'square', 0.12, 0.07); },          // ♪ nom
  die()   { tone(440, 0.5, 'sawtooth', 0.14, 0, 110); tone(330, 0.5, 'triangle', 0.1, 0.05, 82); }, // 💫 womp
  spawn() { tone(523, 0.1, 'sine', 0.14); tone(659, 0.1, 'sine', 0.14, 0.09); tone(784, 0.16, 'sine', 0.14, 0.18); }, // ✨ chime
  turn()  { tone(300, 0.04, 'sine', 0.05); },                                                    // soft tick
  boom()  { tone(140, 0.5, 'sawtooth', 0.22, 0, 45); tone(90, 0.6, 'square', 0.18, 0.03, 35); tone(700, 0.15, 'square', 0.08, 0, 120); }, // 💥
};
// play eat/spawn by watching my own snake
let prevLen = null, prevAlive = null;
setInterval(() => {
  const me = state.players.find(p => p.id === myId);
  if (!me) return;
  if (me.alive && prevAlive === true && prevLen !== null && me.body.length > prevLen) sfx.eat();
  if (me.alive && prevAlive === false) sfx.spawn();
  prevLen = me.body.length; prevAlive = me.alive;
}, 60);

// ---- PWA ----
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});

// ---- render ----
function roundRect(x, y, w, h, r) {
  ctx.beginPath(); ctx.roundRect(x, y, w, h, r); ctx.fill();
}
function draw(t) {
  const W = canvas.width, H = canvas.height;
  // camera mode on mobile: zoomed view following your animal
  const camMode = false; // one fixed screen, no scrolling camera
  let cell, ox, oy;
  const wrapD = (d, n) => ((d + n * 1.5) % n) - n / 2;
  if (camMode) {
    cell = Math.min(W, H) / 11;
    const me = state.players.find(p => p.id === myId);
    if (me && me.alive) {
      const [hx, hy] = me.body[0];
      if (!camInit) { camX = hx; camY = hy; camInit = true; }
      camX = (camX + wrapD(hx - camX, GRID_W) * 0.15 + GRID_W) % GRID_W;
      camY = (camY + wrapD(hy - camY, GRID_H) * 0.15 + GRID_H) % GRID_H;
    }
    ox = W / 2 - (camX + 0.5) * cell;
    oy = H / 2 - (camY + 0.5) * cell;
  } else {
    // on mobile the bottom control bar is reserved — field never overlaps it
    const barPx = (isMobile && mode) ? 132 * devicePixelRatio : 0;
    cell = Math.min(W / GRID_W, (H - barPx) / GRID_H);
    ox = (W - cell * GRID_W) / 2; oy = (H - barPx - cell * GRID_H) / 2;
  }
  // wrap helper: nearest world-copy of coordinate relative to camera
  const wx = x => camMode ? camX + wrapD(x - camX, GRID_W) : x;
  const wy = y => camMode ? camY + wrapD(y - camY, GRID_H) : y;
  if (t < shakeUntil) {
    const k = (shakeUntil - t) / 400 * cell * 0.35;
    ox += (Math.random() - 0.5) * k * 2;
    oy += (Math.random() - 0.5) * k * 2;
  }

  // dreamy bg
  const g = ctx.createLinearGradient(0, 0, W, H);
  g.addColorStop(0, '#fdeef5'); g.addColorStop(.4, '#e9e4fb'); g.addColorStop(.75, '#ddf2f7'); g.addColorStop(1, '#fdf3e2');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

  // sparkles
  for (const s of sparkles) {
    const a = 0.25 + 0.25 * Math.sin(t / 700 + s.ph);
    ctx.fillStyle = `rgba(255,255,255,${a})`;
    ctx.beginPath(); ctx.arc(s.x * W, s.y * H, s.s * devicePixelRatio, 0, 6.28); ctx.fill();
  }

  // faint grid
  ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1;
  if (camMode) {
    for (let px = ((ox % cell) + cell) % cell; px < W; px += cell) { ctx.beginPath(); ctx.moveTo(px, 0); ctx.lineTo(px, H); ctx.stroke(); }
    for (let py = ((oy % cell) + cell) % cell; py < H; py += cell) { ctx.beginPath(); ctx.moveTo(0, py); ctx.lineTo(W, py); ctx.stroke(); }
  } else {
    for (let x = 0; x <= GRID_W; x++) { ctx.beginPath(); ctx.moveTo(ox + x * cell, oy); ctx.lineTo(ox + x * cell, oy + GRID_H * cell); ctx.stroke(); }
    for (let y = 0; y <= GRID_H; y++) { ctx.beginPath(); ctx.moveTo(ox, oy + y * cell); ctx.lineTo(ox + GRID_W * cell, oy + y * cell); ctx.stroke(); }
  }

  ctx.imageSmoothingEnabled = false;

  // poops
  for (const p of state.poops) {
    const spr = p[2] === 1 ? splatCanvas : poopCanvas;
    ctx.drawImage(spr, ox + wx(p[0]) * cell - cell*0.1, oy + wy(p[1]) * cell - cell*0.1, cell*1.2, cell*1.2);
  }
  // bombs (with pulsing glow)
  if (state.bombs) for (const [x, y] of state.bombs) {
    const pulse = 0.5 + 0.5 * Math.sin(t / 200);
    ctx.save();
    ctx.shadowColor = 'rgba(255,120,80,' + (0.5 + 0.4 * pulse) + ')';
    ctx.shadowBlur = 10 + 10 * pulse;
    ctx.drawImage(bombCanvas, ox + wx(x) * cell - cell*0.15, oy + wy(y) * cell - cell*0.15, cell*1.3, cell*1.3);
    ctx.restore();
  }

  // snakes
  for (const p of state.players) {
    if (!p.alive) continue;
    // body
    for (let i = p.body.length - 1; i >= 1; i--) {
      const [x, y] = p.body[i];
      const shade = i % 2 ? p.color : p.color + 'cc';
      ctx.fillStyle = shade;
      roundRect(ox + wx(x) * cell + cell*0.06, oy + wy(y) * cell + cell*0.06, cell*0.88, cell*0.88, cell*0.3);
    }
    // head = animated full-body sprite
    const [hx, hy] = p.body[0];
    const sh = sheets[p.avatar];
    const hs = cell * (isMobile ? 1.6 : 2.4), off = (hs - cell) / 2;
    // frame: eat > walk cycle
    let frame = (Math.floor(t / 180) % 2);            // 0/1 walking
    if (eatUntil[p.id] && t < eatUntil[p.id]) frame = 2; // mouth open
    // sprites face LEFT; flip when moving right (remember last horizontal dir)
    if (p.dir === 'right') lastFace[p.id] = -1;
    else if (p.dir === 'left') lastFace[p.id] = 1;
    const face = lastFace[p.id] || 1;
    const cx = ox + wx(hx) * cell + cell / 2, cy = oy + wy(hy) * cell + cell / 2;
    if (p.id === myId) myHeadPx = [cx, cy];
    ctx.save();
    ctx.shadowColor = p.color; ctx.shadowBlur = 12;
    ctx.translate(cx, cy);
    ctx.scale(face, 1);
    if (sh && sh.complete) ctx.drawImage(sh, frame * FR, 0, FR, FR, -hs/2, -hs/2, hs, hs);
    ctx.restore();
    // name
    ctx.fillStyle = 'rgba(120,95,160,0.85)';
    ctx.font = `${Math.max(11, cell*0.42)}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(p.name, cx, cy - hs/2 - 6);
  }

  // explosion effects
  effects = effects.filter(e => t - e.start < 700);
  for (const e of effects) {
    const pr = (t - e.start) / 700;
    const cx2 = ox + wx(e.x) * cell + cell/2, cy2 = oy + wy(e.y) * cell + cell/2;
    // expanding ring
    ctx.strokeStyle = `rgba(255,150,90,${1 - pr})`;
    ctx.lineWidth = cell * 0.25 * (1 - pr) + 1;
    ctx.beginPath(); ctx.arc(cx2, cy2, pr * cell * 5, 0, 6.28); ctx.stroke();
    // flying poop particles
    for (let i = 0; i < 10; i++) {
      const ang = i / 10 * 6.28 + e.x * 7 + e.y * 3;
      const d = pr * cell * (3 + (i % 3));
      const px = cx2 + Math.cos(ang) * d, py = cy2 + Math.sin(ang) * d - Math.sin(pr * Math.PI) * cell * 1.5;
      ctx.globalAlpha = 1 - pr;
      ctx.drawImage(splatCanvas, px - cell*0.3, py - cell*0.3, cell*0.6, cell*0.6);
      ctx.globalAlpha = 1;
    }
  }

  // hud scoreboard
  const hud = document.getElementById('hud');
  if (hud.style.display === 'block') {
    hud.innerHTML = '🏆 排行榜<br>' + state.players
      .slice().sort((a, b) => b.score - a.score).slice(0, 6)
      .map(p => `${p.alive ? '🐾' : '💀'} ${p.name}：${p.score}`).join('<br>');
  }
  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);
</script>
</body>
</html>
